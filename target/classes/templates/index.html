<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrownField PSS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .navbar { background-color: #0d47a1 !important; }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-dot { height: 12px; width: 12px; background-color: #2ecc71; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">BROWNFIELD PSS</a>
            <span class="text-white">Welcome, <span th:text="${username}">User</span></span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm text-center">
                    <h5 class="text-muted text-uppercase small fw-bold">System Status</h5>
                    <h2 class="text-primary mt-2">
                        <span class="status-dot me-2"></span>
                        <span th:text="${systemStatus}">Active</span>
                    </h2>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold mb-4">Active Flight Schedules (Adapter Managed)</h5>
                    <ul class="list-group list-group-flush">
                        <li th:each="flight : ${activeFlights}" class="list-group-item d-flex justify-content-between align-items-center">
                            <span th:text="${flight}">Flight Info</span>
                            <span class="badge bg-primary rounded-pill">Confirmed</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <button class="btn btn-primary btn-lg px-5 shadow" onclick="location.reload()">Refresh Live Data</button>
        </div>
    </div>

    <footer class="text-center mt-5 py-4 text-muted border-top">
        &copy; 2026 NIIT Lagos | Faculty: Wisdom A.
    </footer>

</body>
</html>
